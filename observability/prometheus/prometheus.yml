global:
  scrape_interval: 5s

scrape_configs:
  # Only one of the two user-service targets is ever actually running — both profiles
  # bind to host port 8081 in outbox-pattern/docker-compose.yml, so polling and CDC
  # can't run concurrently. Whichever one isn't up will show as DOWN in Prometheus;
  # that's expected, not a misconfiguration.
  - job_name: user-service-polling
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-user-service-polling:8081"]
        labels:
          mode: polling

  - job_name: user-service-cdc
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-user-service-cdc:8081"]
        labels:
          mode: cdc

  - job_name: event-consumers
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-event-consumers:8082"]

  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-transaction-service:8091"]

  - job_name: fraud-detection-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-fraud-detection-service:8092"]

  - job_name: loan-application-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-loan-application-service:8101"]

  - job_name: loan-processing-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-loan-processing-service:8102"]

  - job_name: open-banking-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-open-banking-api:8111"]

  - job_name: kyc-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-kyc-service:8121"]

  - job_name: kyc-dlq-processor
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finflow-kyc-dlq-processor:8122"]
