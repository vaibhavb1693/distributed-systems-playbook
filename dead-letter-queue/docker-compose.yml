version: "3.9"

# FinFlow Dead Letter Queue pattern — kyc-service runs the pipeline and classifies/retries
# failures; kyc-dlq-processor consumes the DLQ, auto-replays transient failures after a
# cooldown, and routes permanent failures to manual review with a replay/resolve API.
#
#   docker-compose up -d --build
#
# Host ports offset from other patterns' (Postgres 5434, Kafka 9094) so stacks could run
# concurrently later without colliding.

services:

  postgres:
    image: postgres:15
    container_name: finflow-dlq-postgres
    environment:
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow
      POSTGRES_DB: finflow
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finflow -d finflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finflow-dlq-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finflow-dlq-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29094,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9094"]
      interval: 15s
      timeout: 10s
      retries: 10

  kyc-service:
    build:
      context: ./kyc-service
      dockerfile: Dockerfile
    container_name: finflow-kyc-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29094
      SERVER_PORT: 8121
    ports:
      - "8121:8121"
    networks:
      - default
      - finflow-net

  kyc-dlq-processor:
    build:
      context: ./kyc-dlq-processor
      dockerfile: Dockerfile
    container_name: finflow-kyc-dlq-processor
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29094
      SERVER_PORT: 8122
    ports:
      - "8122:8122"
    networks:
      - default
      - finflow-net

volumes:
  postgres_data:

networks:
  # Created by ../observability/docker-compose.yml — bring that stack up first.
  finflow-net:
    external: true
